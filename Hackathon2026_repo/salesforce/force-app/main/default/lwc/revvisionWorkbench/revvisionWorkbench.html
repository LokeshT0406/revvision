<template>
    <lightning-card title="RevVision Pro - Salesforce Native">
        <div class="slds-p-horizontal_medium slds-p-bottom_medium">
            <lightning-layout multiple-rows>
                <lightning-layout-item size="12" medium-device-size="4" class="slds-p-right_small">
                    <lightning-combobox
                        name="riskProfile"
                        label="Risk Threshold Profile"
                        value={riskProfile}
                        options={riskProfileOptions}
                        onchange={handleRiskProfileChange}>
                    </lightning-combobox>
                </lightning-layout-item>

                <template if:true={isCustomProfile}>
                    <lightning-layout-item size="12" medium-device-size="2" class="slds-p-right_small">
                        <lightning-input type="number" label="Low max" value={lowThreshold} onchange={handleLowChange}></lightning-input>
                    </lightning-layout-item>
                    <lightning-layout-item size="12" medium-device-size="2" class="slds-p-right_small">
                        <lightning-input type="number" label="Moderate max" value={moderateThreshold} onchange={handleModerateChange}></lightning-input>
                    </lightning-layout-item>
                    <lightning-layout-item size="12" medium-device-size="2" class="slds-p-right_small">
                        <lightning-input type="number" label="High max" value={highThreshold} onchange={handleHighChange}></lightning-input>
                    </lightning-layout-item>
                </template>

                <lightning-layout-item size="12" class="slds-m-top_small">
                    <div class="slds-form-element__label">Upload CPQ Artifacts</div>
                    <lightning-button
                        class="slds-m-top_x-small"
                        variant="neutral"
                        label="Choose Files"
                        onclick={openFilePicker}>
                    </lightning-button>
                    <input
                        data-id="cpqFileInput"
                        class="native-file-input-hidden"
                        type="file"
                        multiple
                        accept=".xml,.resource,.cls,.trigger,.flow,.js,.apex"
                        onchange={handleFilesSelected} />
                </lightning-layout-item>

                <lightning-layout-item size="12" class="slds-m-top_x-small">
                    <div class="slds-text-body_small">Selected files: {selectedFileCount}</div>
                    <div class="slds-text-body_small slds-m-top_xx-small">{fileStatus}</div>
                    <template if:true={hasSelectedFiles}>
                        <div class="slds-text-title_bold slds-m-top_small">Uploaded Files</div>
                        <ul class="slds-list_dotted slds-p-left_large slds-m-top_x-small">
                            <template for:each={selectedFileNames} for:item="name">
                                <li key={name}>{name}</li>
                            </template>
                        </ul>
                    </template>
                </lightning-layout-item>

                <lightning-layout-item size="12" class="slds-m-top_small">
                    <lightning-button variant="brand" label="Analyze" onclick={handleAnalyze} disabled={analyzeDisabled}></lightning-button>
                </lightning-layout-item>
            </lightning-layout>
        </div>

        <template if:true={result}>
            <div class="slds-p-horizontal_medium slds-p-bottom_medium">
                <lightning-tabset variant="scoped">
                    <lightning-tab label="Dashboard">
                        <lightning-layout multiple-rows>
                            <lightning-layout-item size="12" medium-device-size="2" class="slds-p-around_x-small">
                                <div class="metric">
                                    <div class="metric-label">Files Uploaded</div>
                                    <div class="metric-value">{result.totalFiles}</div>
                                </div>
                            </lightning-layout-item>
                            <lightning-layout-item size="12" medium-device-size="2" class="slds-p-around_x-small">
                                <div class="metric">
                                    <div class="metric-label">Total Risk Score</div>
                                    <div class="metric-value">{result.totalScore}</div>
                                </div>
                            </lightning-layout-item>
                            <lightning-layout-item size="12" medium-device-size="2" class="slds-p-around_x-small">
                                <div class="metric">
                                    <div class="metric-label">Org Risk</div>
                                    <div class="metric-value">{result.orgRisk}</div>
                                    <div class="metric-sub">{highCriticalSummary}</div>
                                </div>
                            </lightning-layout-item>
                            <lightning-layout-item size="12" medium-device-size="2" class="slds-p-around_x-small">
                                <div class="metric">
                                    <div class="metric-label">QCP Files</div>
                                    <div class="metric-value">{qcpFileCount}</div>
                                </div>
                            </lightning-layout-item>
                            <lightning-layout-item size="12" medium-device-size="2" class="slds-p-around_x-small">
                                <div class="metric">
                                    <div class="metric-label">Est. Effort</div>
                                    <div class="metric-value">{estimatedEffortWeeks}w</div>
                                    <div class="metric-sub">total migration weeks</div>
                                </div>
                            </lightning-layout-item>
                            <lightning-layout-item size="12" medium-device-size="2" class="slds-p-around_x-small">
                                <div class="metric">
                                    <div class="metric-label">ROI</div>
                                    <div class="metric-value">${roi.costSaved}</div>
                                    <div class="metric-sub">{roi.efficiencyGainPct}% efficiency</div>
                                </div>
                            </lightning-layout-item>
                        </lightning-layout>

                        <div class="slds-m-top_medium">
                            <h3 class="slds-text-heading_small slds-m-bottom_x-small">Risk Score Ranges (Per File: 0-1000)</h3>
                            <lightning-datatable
                                key-field="risk"
                                data={result.riskRanges}
                                columns={riskRangeColumns}
                                hide-checkbox-column>
                            </lightning-datatable>
                        </div>

                        <lightning-layout multiple-rows class="slds-m-top_medium">
                            <lightning-layout-item size="12" medium-device-size="6" class="slds-p-right_small">
                                <h3 class="slds-text-heading_small slds-m-bottom_x-small">Risk Distribution</h3>
                                <lightning-datatable
                                    key-field="risk"
                                    data={riskDistributionRows}
                                    columns={riskDistributionColumns}
                                    hide-checkbox-column>
                                </lightning-datatable>
                            </lightning-layout-item>
                            <lightning-layout-item size="12" medium-device-size="6">
                                <h3 class="slds-text-heading_small slds-m-bottom_x-small">Artifact Type Breakdown</h3>
                                <lightning-datatable
                                    key-field="typeLabel"
                                    data={typeBreakdownRows}
                                    columns={typeBreakdownColumns}
                                    hide-checkbox-column>
                                </lightning-datatable>
                            </lightning-layout-item>
                        </lightning-layout>

                        <div class="slds-m-top_medium">
                            <h3 class="slds-text-heading_small slds-m-bottom_x-small">Artifact Summary</h3>
                            <lightning-datatable
                                key-field="fileName"
                                data={artifactSummaryRows}
                                columns={artifactSummaryColumns}
                                hide-checkbox-column>
                            </lightning-datatable>
                        </div>

                        <div class="slds-m-top_medium">
                            <h3 class="slds-text-heading_small slds-m-bottom_x-small">Risk Scoring Note</h3>
                            <div class="slds-text-body_regular">{riskScoreNote}</div>
                        </div>
                    </lightning-tab>

                    <lightning-tab label="File Analysis">
                        <div class="slds-m-top_small">
                            <lightning-datatable
                                key-field="fileName"
                                data={artifacts}
                                columns={columns}
                                hide-checkbox-column>
                            </lightning-datatable>
                        </div>

                        <template if:true={hasArtifacts}>
                            <div class="slds-m-top_medium">
                                <lightning-combobox
                                    label="Select artifact to inspect"
                                    value={selectedArtifactName}
                                    options={artifactOptions}
                                    onchange={handleArtifactChange}>
                                </lightning-combobox>
                            </div>

                            <div class="slds-m-top_small metric">
                                <div class="metric-label">Selected Artifact</div>
                                <div class="slds-text-title_bold">{selectedArtifact.fileName}</div>
                                <div class="slds-m-top_x-small">
                                    Type: {selectedArtifact.typeLabel} | Risk: {selectedArtifact.risk} | Score: {selectedArtifact.score} | Effort: {selectedArtifact.estWeeks} weeks
                                </div>
                                <div class="slds-m-top_x-small">
                                    Hardcoded IDs: {selectedArtifact.hardcodedIds} | SOQL Hits: {selectedArtifact.soqlHits} | SBQQ Refs: {selectedArtifact.sbqqRefs} | QCP Hooks: {selectedArtifact.qcpHooks}
                                </div>
                            </div>

                            <div class="slds-m-top_medium">
                                <h3 class="slds-text-heading_small slds-m-bottom_x-small">Migration Action Items</h3>
                                <ul class="slds-list_dotted slds-p-left_large">
                                    <template for:each={selectedArtifactActions} for:item="actionItem">
                                        <li key={actionItem}>{actionItem}</li>
                                    </template>
                                </ul>
                            </div>
                        </template>
                    </lightning-tab>

                    <lightning-tab label="Parameters">
                        <lightning-layout multiple-rows class="slds-m-top_small">
                            <lightning-layout-item size="12" medium-device-size="2" class="slds-p-around_x-small">
                                <div class="metric">
                                    <div class="metric-label">Conditions</div>
                                    <div class="metric-value">{totalConditions}</div>
                                </div>
                            </lightning-layout-item>
                            <lightning-layout-item size="12" medium-device-size="2" class="slds-p-around_x-small">
                                <div class="metric">
                                    <div class="metric-label">Actions</div>
                                    <div class="metric-value">{totalActions}</div>
                                </div>
                            </lightning-layout-item>
                            <lightning-layout-item size="12" medium-device-size="2" class="slds-p-around_x-small">
                                <div class="metric">
                                    <div class="metric-label">Lookups</div>
                                    <div class="metric-value">{totalLookups}</div>
                                </div>
                            </lightning-layout-item>
                            <lightning-layout-item size="12" medium-device-size="2" class="slds-p-around_x-small">
                                <div class="metric">
                                    <div class="metric-label">SOQL Hits</div>
                                    <div class="metric-value">{totalSoqlHits}</div>
                                </div>
                            </lightning-layout-item>
                            <lightning-layout-item size="12" medium-device-size="2" class="slds-p-around_x-small">
                                <div class="metric">
                                    <div class="metric-label">Hardcoded IDs</div>
                                    <div class="metric-value">{totalHardcodedIds}</div>
                                </div>
                            </lightning-layout-item>
                            <lightning-layout-item size="12" medium-device-size="2" class="slds-p-around_x-small">
                                <div class="metric">
                                    <div class="metric-label">QCP Hooks</div>
                                    <div class="metric-value">{totalQcpHooks}</div>
                                </div>
                            </lightning-layout-item>
                        </lightning-layout>
                        <div class="slds-m-top_small">
                            <lightning-datatable
                                key-field="fileName"
                                data={artifacts}
                                columns={parameterColumns}
                                hide-checkbox-column>
                            </lightning-datatable>
                        </div>
                    </lightning-tab>

                    <lightning-tab label="Readiness">
                        <lightning-layout multiple-rows class="slds-m-top_small">
                            <lightning-layout-item size="12" medium-device-size="3" class="slds-p-around_x-small">
                                <div class="metric">
                                    <div class="metric-label">Assessment Status</div>
                                    <div class="metric-value">{readinessStatusText}</div>
                                    <div class="metric-sub">{result.readinessStatus}</div>
                                </div>
                            </lightning-layout-item>
                            <lightning-layout-item size="12" medium-device-size="3" class="slds-p-around_x-small">
                                <div class="metric">
                                    <div class="metric-label">Confidence</div>
                                    <div class="metric-value">{result.confidenceScore}%</div>
                                    <div class="metric-sub">{result.confidenceLabel}</div>
                                </div>
                            </lightning-layout-item>
                            <lightning-layout-item size="12" medium-device-size="3" class="slds-p-around_x-small">
                                <div class="metric">
                                    <div class="metric-label">Required Areas Covered</div>
                                    <div class="metric-value">{result.mandatoryMet}/{result.mandatoryTotal}</div>
                                    <div class="metric-sub">pricing, automation, data, customization</div>
                                </div>
                            </lightning-layout-item>
                            <lightning-layout-item size="12" medium-device-size="3" class="slds-p-around_x-small">
                                <div class="metric">
                                    <div class="metric-label">High/Critical</div>
                                    <div class="metric-value">{result.highCriticalFiles}</div>
                                    <div class="metric-sub">{highCriticalSummary}</div>
                                </div>
                            </lightning-layout-item>
                        </lightning-layout>

                        <div class="slds-m-top_medium">
                            <h3 class="slds-text-heading_small slds-m-bottom_x-small">Coverage</h3>
                            <lightning-datatable
                                key-field="component"
                                data={result.coverageRows}
                                columns={coverageColumns}
                                hide-checkbox-column>
                            </lightning-datatable>
                        </div>

                        <div class="slds-m-top_medium">
                            <h3 class="slds-text-heading_small slds-m-bottom_x-small">Pricing Signals</h3>
                            <lightning-layout multiple-rows>
                                <lightning-layout-item size="12" medium-device-size="2" class="slds-p-around_x-small">
                                    <div class="metric">
                                        <div class="metric-label">Conditions</div>
                                        <div class="metric-value">{result.pricingConditions}</div>
                                    </div>
                                </lightning-layout-item>
                                <lightning-layout-item size="12" medium-device-size="2" class="slds-p-around_x-small">
                                    <div class="metric">
                                        <div class="metric-label">Actions</div>
                                        <div class="metric-value">{result.pricingActions}</div>
                                    </div>
                                </lightning-layout-item>
                                <lightning-layout-item size="12" medium-device-size="2" class="slds-p-around_x-small">
                                    <div class="metric">
                                        <div class="metric-label">Lookups</div>
                                        <div class="metric-value">{result.pricingLookups}</div>
                                    </div>
                                </lightning-layout-item>
                                <lightning-layout-item size="12" medium-device-size="3" class="slds-p-around_x-small">
                                    <div class="metric">
                                        <div class="metric-label">QCP Files</div>
                                        <div class="metric-value">{result.pricingQcpFiles}</div>
                                    </div>
                                </lightning-layout-item>
                                <lightning-layout-item size="12" medium-device-size="3" class="slds-p-around_x-small">
                                    <div class="metric">
                                        <div class="metric-label">High-Risk Pricing Files</div>
                                        <div class="metric-value">{result.highRiskPricingFiles}</div>
                                    </div>
                                </lightning-layout-item>
                            </lightning-layout>
                        </div>
                    </lightning-tab>

                    <lightning-tab label="Roadmap">
                        <div class="slds-m-top_small">
                            <lightning-datatable
                                key-field="phase"
                                data={roadmapRows}
                                columns={roadmapColumns}
                                hide-checkbox-column>
                            </lightning-datatable>
                        </div>
                    </lightning-tab>

                    <lightning-tab label="Blueprint">
                        <div class="slds-m-top_small">
                            <h3 class="slds-text-heading_small slds-m-bottom_x-small">SBQQ to RCA Mapping (In Scope)</h3>
                            <template if:true={mappingBullets.length}>
                                <ul class="slds-list_dotted slds-p-left_large">
                                    <template for:each={mappingBullets} for:item="m">
                                        <li key={m}>{m}</li>
                                    </template>
                                </ul>
                            </template>

                            <div class="slds-m-top_medium">
                                <lightning-radio-group
                                    name="blueprintMode"
                                    label="Blueprint mode"
                                    options={blueprintModeOptions}
                                    value={blueprintMode}
                                    type="button"
                                    onchange={handleBlueprintModeChange}>
                                </lightning-radio-group>
                            </div>

                            <template if:true={isSingleBlueprintMode}>
                                <div class="slds-m-top_small">
                                    <lightning-combobox
                                        label="Select artifact"
                                        value={blueprintArtifactName}
                                        options={artifactOptions}
                                        onchange={handleBlueprintArtifactChange}>
                                    </lightning-combobox>
                                </div>
                            </template>

                            <div class="slds-m-top_medium">
                                <h3 class="slds-text-heading_small slds-m-bottom_x-small">Detailed Blueprint</h3>
                                <lightning-formatted-rich-text value={blueprintHtml}></lightning-formatted-rich-text>
                            </div>
                        </div>
                    </lightning-tab>
                </lightning-tabset>
            </div>
        </template>
    </lightning-card>
</template>
